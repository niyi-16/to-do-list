# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - niyi-16-todoapp

on:
  push:
    branches:
      - tests
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: npm install, build, and test
        env:
          NG_APP_API_URL : ${{ secrets.NG_APP_API_URL }}
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B77C287046E34AEABBA2B51C862B62BA }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A25CA65EA7F14210837FBACCAED0B75C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_7ACA292EB43845B2BF69DB839F6A3E6B }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'niyi-16-todoapp'
          slot-name: 'Production'
          package: .

  pull-req:
    permissions:
      pull-requests: write
      contents: read
    needs: [ deploy ]
    name: Create and Merge Pull Request
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Pull Request for ${{github.ref_name}} and merge into master
        run: |
          # Create PR if it doesn't exist
          pr_url=$(gh pr create -B master -H ${{github.ref_name}} --title "Automated Pull Request" --body "This PR was 
          created and 
          merged automatically by GitHub Actions." 2>/dev/null || gh pr list -H tests -B master --json url -q '.[0].url')
          
          if [ -n "$pr_url" ]; then
            echo "PR URL: $pr_url"
            gh pr merge "$pr_url" --merge --auto
          else
            echo "No PR created or found."
          fi